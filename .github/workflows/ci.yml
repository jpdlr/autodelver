name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  npm-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run check
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  bun-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Type-check
        run: bun run check
      - name: Test
        run: bun test
      - name: Build
        run: bun run build
